<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; }
  p { color: #fff; font-size: 12px; font-family: sans-serif; }
  svg { max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<p>Banner YouTube — 2560 × 1440 px</p>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF6EE"/>
      <stop offset="100%" stop-color="#F2E0CC"/>
    </linearGradient>
  </defs>

  <!-- Fons -->
  <rect width="2560" height="1440" fill="url(#bg)"/>

  <!-- Línies de fons subtils -->
  <line x1="0" y1="200" x2="2560" y2="200" stroke="#C2622A" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="1240" x2="2560" y2="1240" stroke="#C2622A" stroke-width="1" opacity="0.07"/>
  <line x1="200" y1="0" x2="200" y2="1440" stroke="#C2622A" stroke-width="1" opacity="0.05"/>
  <line x1="2360" y1="0" x2="2360" y2="1440" stroke="#C2622A" stroke-width="1" opacity="0.05"/>

  <!-- Accent barra inferior -->
  <rect x="0" y="1390" width="2560" height="50" fill="#C2622A" opacity="0.18"/>
  <rect x="0" y="1420" width="2560" height="20" fill="#8B3A18" opacity="0.25"/>

  <!-- Accent barra superior -->
  <rect x="0" y="0" width="2560" height="12" fill="#C2622A" opacity="0.35"/>

  <!-- Punt decoratiu esquerra -->
  <circle cx="320" cy="720" r="180" fill="#C2622A" opacity="0.04"/>
  <circle cx="320" cy="720" r="120" fill="#C2622A" opacity="0.04"/>

  <!-- Punt decoratiu dreta -->
  <circle cx="2240" cy="720" r="180" fill="#8B3A18" opacity="0.04"/>
  <circle cx="2240" cy="720" r="120" fill="#8B3A18" opacity="0.04"/>

  <!-- WORDMARK PRINCIPAL -->
  <!-- "la meva" -->
  <text x="1280" y="680"
    text-anchor="middle"
    font-family="Lora, Georgia, serif"
    font-size="160"
    font-weight="400"
    font-style="italic"
    letter-spacing="8"
    fill="#2C1A0E"
    opacity="0.82">la meva</text>

  <!-- "escola" — color accent -->
  <text x="1280" y="860"
    text-anchor="middle"
    font-family="Lora, Georgia, serif"
    font-size="220"
    font-weight="700"
    letter-spacing="-4"
    fill="#C2622A">escola</text>

  <!-- Línia sota escola -->
  <rect x="880" y="892" width="800" height="5" rx="2.5" fill="#C2622A" opacity="0.3"/>

  <!-- Slogan -->
  <text x="1280" y="980"
    text-anchor="middle"
    font-family="Lora, Georgia, serif"
    font-size="52"
    font-weight="400"
    letter-spacing="10"
    fill="#8B3A18"
    opacity="0.6">eines digitals per a docents</text>

</svg>
<p>Clic dret → Obre imatge en nova pestanya → Guardar com PNG</p>
</body>
</html>

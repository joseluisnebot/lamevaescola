<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Meva Escola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F9F8F6;
      --surface:  #FFFFFF;
      --border:   #E8E6E1;
      --text:     #1A1917;
      --muted:    #6B6860;
      --accent:   #2D6A4F;
      --accent-l: #D8EDE3;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-l);
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    p {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .form input[type="email"] {
      flex: 1 1 220px;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form input[type="email"]::placeholder { color: #B0ADA6; }
    .form input[type="email"]:focus { border-color: var(--accent); }

    .form button {
      padding: 0.75rem 1.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .form button:hover { opacity: 0.85; }

    .note {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #B0ADA6;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0 2rem;
    }

    footer {
      font-size: 0.78rem;
      color: #C5C2BB;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="badge">Pròximament</div>

    <h1>La Meva<br /><span>Escola</span></h1>

    <p>
      Estem preparant quelcom especial per a escoles i famílies.<br />
      Una plataforma pensada per acostar la comunitat educativa.
    </p>

    <hr />
    <footer>© 2026 lamevaescola.com — tots els drets reservats</footer>
  </div>
</body>
</html>

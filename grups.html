<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Grups Aleatoris — la meva escola</title>
  <meta name="description" content="Divideix la teva classe en grups aleatoris de forma instantània. Eina gratuïta per a docents." />
  <link rel="canonical" href="https://lamevaescola.com/grups.html" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#F7F9F7;--surface:#FFFFFF;--border:#DDE8DD;--text:#1A1917;--muted:#6B7B6B;--accent:#2D6A4F;--accent-l:#D8EDE3;--accent-d:#1B4332; }
    body { font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh; }
    nav { display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:rgba(247,249,247,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50; }
    .nav-logo { font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-0.03em; }
    .nav-logo span { color:var(--accent); }
    .hero { text-align:center;padding:3.5rem 1.5rem 2.5rem;max-width:620px;margin:0 auto; }
    .hero-pill { display:inline-flex;align-items:center;gap:0.4rem;background:var(--accent-l);color:var(--accent-d);font-size:0.75rem;font-weight:700;padding:0.35rem 0.9rem;border-radius:999px;margin-bottom:1.25rem;letter-spacing:0.05em;text-transform:uppercase; }
    h1 { font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;line-height:1.15;letter-spacing:-0.04em;margin-bottom:0.75rem; }
    h1 span { color:var(--accent); }
    .hero-sub { font-size:1rem;color:var(--muted);line-height:1.65; }
    .main { max-width:780px;margin:0 auto;padding:0 1.5rem 4rem; }
    .card { background:var(--surface);border:1px solid var(--border);border-radius:1.5rem;box-shadow:0 4px 24px rgba(45,106,79,0.08);padding:2rem;margin-bottom:2rem; }
    .field { display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem; }
    label { font-size:0.82rem;font-weight:600;color:var(--text); }
    textarea, input, select { background:#F7F9F7;border:1.5px solid #DDE8DD;border-radius:0.6rem;padding:0.65rem 0.9rem;font-size:0.9rem;font-family:inherit;color:var(--text);outline:none;transition:border-color 0.15s;width:100%; }
    textarea:focus, input:focus, select:focus { border-color:#2D6A4F; }
    textarea { resize:vertical;min-height:140px; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }
    @media(max-width:520px) { .form-row { grid-template-columns:1fr; } }
    .btn { width:100%;background:#2D6A4F;color:#fff;font-weight:700;font-size:0.95rem;border:none;border-radius:0.75rem;padding:0.9rem;cursor:pointer;transition:background 0.15s;margin-top:0.5rem;font-family:inherit; }
    .btn:hover { background:#1B4332; }
    .btn-secondary { background:white;color:var(--accent);border:1.5px solid var(--border);margin-top:0.5rem; }
    .btn-secondary:hover { background:var(--accent-l); }
    .result-card { display:none; }
    .result-card.active { display:block; }
    .grups-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1rem; }
    .grup { background:var(--accent-l);border-radius:1rem;padding:1rem; }
    .grup-title { font-size:0.78rem;font-weight:700;color:var(--accent-d);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.6rem; }
    .grup-member { font-size:0.9rem;color:var(--text);padding:0.25rem 0;border-bottom:1px solid rgba(45,106,79,0.1); }
    .grup-member:last-child { border:none; }
    .resum { font-size:0.85rem;color:var(--muted);margin-bottom:1rem; }
    @media print {
      nav,.card:not(.result-card),.btn,.btn-secondary { display:none!important; }
      .result-card { display:block!important; }
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">la meva <span>escola</span></a>
  <a href="/" style="font-size:0.85rem;color:var(--muted);text-decoration:none;">← Tornar</a>
</nav>

<div class="hero">
  <div class="hero-pill">🎲 Sense IA</div>
  <h1>Generador de <span>grups aleatoris</span></h1>
  <p class="hero-sub">Enganxa la llista d'alumnes i genera grups equilibrats en un sol clic.</p>
</div>

<div class="main">
  <div class="card">
    <div class="field">
      <label>Llista d'alumnes (un per línia)</label>
      <textarea id="alumnes" placeholder="Anna García&#10;Biel Martínez&#10;Carla López&#10;David Puig&#10;Emma Torres&#10;..."></textarea>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Mode de divisió</label>
        <select id="mode">
          <option value="ngrups">Nombre de grups</option>
          <option value="mida">Mida de cada grup</option>
        </select>
      </div>
      <div class="field">
        <label id="num-label">Nombre de grups</label>
        <input type="number" id="num" value="4" min="2" max="30" />
      </div>
    </div>
    <button class="btn" onclick="generar()">🎲 Generar grups</button>
  </div>

  <div class="card result-card" id="result">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <div class="result-title" style="font-size:1.1rem;font-weight:800;color:var(--accent-d);">Grups generats</div>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-secondary" style="width:auto;padding:0.5rem 1rem;font-size:0.85rem;margin:0;" onclick="generar()">🔄 Tornar a barrejar</button>
        <button class="btn" style="width:auto;padding:0.5rem 1rem;font-size:0.85rem;margin:0;" onclick="window.print()">⬇ Imprimir</button>
      </div>
    </div>
    <p class="resum" id="resum"></p>
    <div class="grups-grid" id="grups-output"></div>
  </div>
</div>

<script src="/cookies.js"></script>
<script>
  document.getElementById('mode').addEventListener('change', function() {
    document.getElementById('num-label').textContent = this.value === 'ngrups' ? 'Nombre de grups' : 'Alumnes per grup';
  });

  function generar() {
    const text = document.getElementById('alumnes').value.trim();
    if (!text) { alert('Enganxa la llista d\'alumnes primer.'); return; }
    const alumnes = text.split('\n').map(a => a.trim()).filter(a => a.length > 0);
    if (alumnes.length < 2) { alert('Necessites almenys 2 alumnes.'); return; }

    // Barrejar Fisher-Yates
    const shuffled = [...alumnes];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    const mode = document.getElementById('mode').value;
    const num = parseInt(document.getElementById('num').value);
    let grups = [];

    if (mode === 'ngrups') {
      const mida = Math.ceil(shuffled.length / num);
      for (let i = 0; i < num; i++) {
        const grup = shuffled.slice(i * mida, (i + 1) * mida);
        if (grup.length > 0) grups.push(grup);
      }
    } else {
      for (let i = 0; i < shuffled.length; i += num) {
        grups.push(shuffled.slice(i, i + num));
      }
    }

    document.getElementById('resum').textContent = `${alumnes.length} alumnes dividits en ${grups.length} grups`;
    const out = document.getElementById('grups-output');
    out.innerHTML = grups.map((g, i) => `
      <div class="grup">
        <div class="grup-title">Grup ${i + 1}</div>
        ${g.map(a => `<div class="grup-member">${a}</div>`).join('')}
      </div>
    `).join('');

    const result = document.getElementById('result');
    result.classList.add('active');
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
